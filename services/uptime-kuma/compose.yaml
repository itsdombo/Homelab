name: uptime-kuma

services:
  uptime-kuma:
    container_name: uptime-kuma
    image: louislam/uptime-kuma:1
    restart: always
    volumes:
      - uptime_kuma_data:/app/data
    ports:
      # Web UI. Visit http://<host-ip>:3001
      - 3001:3001
    environment:
      TZ: ${TIMEZONE:-UTC}

volumes:
  uptime_kuma_data:
    name: uptime_kuma_data
