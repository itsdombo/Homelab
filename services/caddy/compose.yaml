name: caddy

# NOTE: this service is built locally (Cloudflare DNS plugin, see Dockerfile),
# not pulled. The timer's `docker compose up -d` builds it on first deploy, but
# will NOT rebuild it on later Caddy releases. To update Caddy, rebuild by hand:
#   docker compose --env-file hosts/pve2/.env -f hosts/pve2/compose.yaml build caddy
# then the next reconcile recreates the container.

services:
  caddy:
    container_name: caddy
    build:
      context: .
    restart: always
    ports:
      # 80 only redirects to HTTPS; 443 serves the sites (TCP + UDP for HTTP/3).
      - 80:80
      - 443:443
      - 443:443/udp
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist issued certs + the ACME account. Losing this re-issues on every
      # start and can hit Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
