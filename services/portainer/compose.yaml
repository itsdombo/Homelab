name: portainer

services:
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: always
    command: -H unix:///var/run/docker.sock
    volumes:
      # Lets Portainer see and manage the containers on this host
      - /var/run/docker.sock:/var/run/docker.sock
      - data:/data
    ports:
      # Web UI over HTTPS. Visit https://<host-ip>:9443
      - 9443:9443

volumes:
  data:
    name: portainer_data
