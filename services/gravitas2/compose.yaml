name: gravitas2

# Minecraft server running the "All The Mods - Gravitas²" CurseForge modpack
# (modpack version 0.9.4) via the itzg/minecraft-server image. Runs on pve1.
# See ./README.md for operations (first-boot download, console attach, memory).
#
# World and mod data are a bind mount on the SSD tier (/opt/appdata/gravitas2)
# — active game state, kept on fast local storage, not a named volume.
#
# Uses TIMEZONE from hosts/<label>/.env (pve1 sets America/Vancouver).

services:
  gravitas2:
    container_name: gravitas2
    # Floating tag: the reconcile's `docker compose pull` tracks the latest
    # server runtime. The modpack itself is pinned by CF_SERVER_MOD below.
    image: itzg/minecraft-server
    restart: unless-stopped
    # Needed to attach to the server console (docker attach gravitas2).
    stdin_open: true
    tty: true
    ports:
      - "25565:25565/tcp"
      # Simple Voice Chat (bundled in the pack) — UDP, same default port for
      # every player; game traffic stays on 25565/tcp.
      - "24454:24454/udp"
    environment:
      EULA: "TRUE"
      # AUTO_CURSEFORGE resolves and installs the server pack via CurseForge's
      # official API. Needs CF_API_KEY from hosts/pve1/.env — see .env.example
      # for the key gotchas ($$-escaping; org rename + key regen if 403).
      TYPE: AUTO_CURSEFORGE
      CF_API_KEY: ${CF_API_KEY}
      CF_SLUG: all-the-mods-gravitas2
      # File 7948145 = the 0.9.4 CLIENT modpack zip; AUTO_CURSEFORGE resolves
      # its paired server pack (7948149) itself. CF_FILE_ID must be the client
      # file — pointing it at the server pack fails with "did not contain a
      # manifest.json". Bump to the new client file ID to update the pack.
      CF_FILE_ID: "7948145"
      # The installer skips mods it thinks are client-only; Caelum is
      # miscategorized but is a hard server-side dependency of TFCCaelum
      # (crash: "Mod tfccaelum requires caelum ... not installed").
      CF_FORCE_INCLUDE_MODS: caelum
      # 5G heap inside a 7G container. 6G froze the box (RAM 99% + swap
      # exhausted on first player join): the JVM's off-heap overhead for ~370
      # mods (metaspace, threads, direct buffers) rides on top of -Xmx, so the
      # heap must leave real headroom for it plus the OS.
      MEMORY: "5G"
      # Default 10/10 is too heavy for 4 cores + 7G with this pack. View is
      # what players see (Distant Horizons fills in beyond it client-side);
      # simulation is what actually ticks — the CPU/memory knob.
      VIEW_DISTANCE: "6"
      SIMULATION_DISTANCE: "6"
      # The spark mod's background profiler loads a native async-profiler lib
      # that SIGSEGVs the JVM (Java 25, unprivileged LXC) right after
      # "Starting background profiler...". Disable it; on-demand /spark
      # commands still work.
      JVM_DD_OPTS: spark.backgroundProfiler=false
      TZ: ${TIMEZONE:-UTC}
    volumes:
      # World + mods on the SSD tier. Create /opt/appdata/gravitas2 before the
      # first deploy; the image populates it on first boot.
      - /opt/appdata/gravitas2:/data
